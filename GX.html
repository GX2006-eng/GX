<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>关心❤️专属</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 登录界面 */
        .login-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fdd8e5;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px #ff69b4;
            z-index: 100;
            width: 90%;
            max-width: 280px;
        }
        .login-box h2 {
            color: #ff69b4;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 11px 14px;
            margin: 7px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }
        .login-box button {
            width: 100%;
            padding: 11px;
            background: #ff69b4;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }
        /* 倒计时  */
        .count-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            color: #ff69b4;
            font-weight: bold;
            display: none;
            z-index: 99;
            text-align: center;
            line-height: 1.2;
        }
        /* 手机端小卡片 */
        .card-box {
            position: absolute;
            width: 80px;
            height: 26px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #333;
            border-radius: 4px;
            transition: left 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        top 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        /* 电脑端恢复正常大小 */
        @media (min-width:768px) {
            .card-box {
                width: 125px;
                height: 38px;
                font-size: 13px;
            }
            .count-tip {
                font-size: 90px;
            }
        }

                .final-box {
            position: fixed;
            top: 50%;
: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff69b4;
            color: white;
            padding: 35px 30px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            z-index: 200;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.6);
            display: none;
            width: 85%;
            max-width: 420px;
            line-height: 1.6;
            animation: fadeIn 1.2s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

<!-- 登录 -->
<div class="login-box" id="loginBox">
    <h2>专属登录</h2>
    <input type="text" id="userName" placeholder="用户名">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="loginCheck()">登录</button>
</div>

<!-- 倒计时 -->
<div class="count-tip" id="countTip">别心急<br>3</div>


<div class="final-box" id="finalBox">最重要的是小关老师要天天开心</div>

<script>
// 自动适配设备尺寸
const isMobile = window.innerWidth < 768;
const WIN_W = isMobile ? 80 : 125;
const WIN_H = isMobile ? 26 : 38;
const HEART_SCALE = isMobile ? 14 : 26;
const HEART_COUNT = 130;
const NEW_ADD_COUNT = 70;
const WAIT_SEC = 1;
const SPREAD_ALL_SEC = 3;

const texts = [
    '慢慢相处','平安喜乐','有点贪心','万般倾心',
    '朝朝暮暮','温柔以待','心生欢喜','万事顺遂',
    '记得开心','不离不弃','来日方长','感谢相遇',
    '偏爱例外','满眼星河','风遇山海','我遇于你',
    '余光皆你','心起涟漪','情有归处','温柔沦陷',
    '风寄心事','云间藏念','落笔予你','半醒心动',
    '晚风念旧','星河予卿','清欢予你','枕月思君',
    '只予温柔','来日可期','缘起于你','不负韶华',
    '借风寻你','温渡朝暮','心事予卿','神明偏爱'
];
const colors = [
    'lightpink','lavender','lightblue','lightyellow',
    'mistyrose','peachpuff','plum','lightcyan'
];

let heartCards = [];
let screenW = window.innerWidth;
let screenH = window.innerHeight;
let centerX = screenW / 2;
let centerY = screenH / 2;

// 登录验证
function loginCheck() {
    let user = document.getElementById("userName").value.trim();
    let pwd = document.getElementById("pwd").value.trim();
    if (user === "GX" && pwd === "20060406") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("countTip").style.display = "block";
        startCountDown();
    } else {
        alert("用户名或密码错误");
    }
}

// 倒计时 
function startCountDown() {
    let num = 3;
    let tip = document.getElementById("countTip");
    let timer = setInterval(() => {
        num--;
        tip.innerHTML = `别心急<br>${num}`;
        if (num <= 0) {
            clearInterval(timer);
            tip.style.display = "none";
            startHeartEffect();
        }
    }, 1000);
}

//坐标公式
function getHeartPoints(t) {
    let x = HEART_SCALE * 16 * Math.pow(Math.sin(t), 3);
    let y = -HEART_SCALE * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x, y };
}

//小卡片
function createCard(x, y) {
    let card = document.createElement("div");
    card.className = "card-box";
    card.style.left = x + "px";
    card.style.top = y + "px";
    card.style.background = colors[Math.floor(Math.random() * colors.length)];
    card.innerText = texts[Math.floor(Math.random() * texts.length)];
    document.body.appendChild(card);
    return card;
}

// 随机生成
function randomCornerPos() {
    let edge = ["left", "right", "top", "bottom"][Math.floor(Math.random() * 4)];
    let x, y;
    if (edge === "left") {
        x = Math.random() * (screenW / 4);
        y = Math.random() * (screenH - WIN_H);
    } else if (edge === "right") {
        x = (screenW * 3/4) + Math.random() * (screenW/4 - WIN_W);
        y = Math.random() * (screenH - WIN_H);
    } else if (edge === "top") {
        x = Math.random() * (screenW - WIN_W);
        y = Math.random() * (screenH / 4);
    } else {
        x = Math.random() * (screenW - WIN_W);
        y = (screenH * 3/4) + Math.random() * (screenH/4 - WIN_H);
    }
    return { x, y };
}

// 延迟函数
function delay(ms) {
    return new Promise(res => setTimeout(res, ms));
}

// 主效果：爱心丝滑爆开
async function startHeartEffect() {
    // 1. 生成爱心
    for (let i = 0; i < HEART_COUNT; i++) {
        let t = i * 2 * Math.PI / HEART_COUNT;
        let pos = getHeartPoints(t);
        let px = centerX + pos.x - WIN_W / 2;
        let py = centerY + pos.y - WIN_H / 2;
        let card = createCard(px, py);
        heartCards.push(card);
        await delay(30);
    }

    // 定格
    await delay(WAIT_SEC * 1000);

    //  爆开
    heartCards.forEach(card => {
        let tx = Math.random() * (screenW - WIN_W);
        let ty = Math.random() * (screenH - WIN_H);
        card.style.left = tx + "px";
        card.style.top = ty + "px";
    });

    // 四角陆续生成铺满
    let steps = 30;
    let stepSleep = (SPREAD_ALL_SEC * 1000) / steps;
    let newAdded = 0;

    for (let step = 1; step <= steps; step++) {
        let ratio = step / steps;
        let needNow = parseInt(NEW_ADD_COUNT * ratio);
        
        while (newAdded < needNow) {
            let pos = randomCornerPos();
            createCard(pos.x, pos.y);
            newAdded++;
        }
        await delay(stepSleep);
    }
    await delay(800);
    document.getElementById("finalBox").style.display = "block";
}
</script>
</body>
</html>
